<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro Liquid Glass UI</title>
    <style>
        :root {
            --bg-opacity: 0.2;
            --blur-val: 20px;
            --saturate-val: 180%;
            --border-val: 0.3;
            --tilt-x: 0deg;
            --tilt-y: 0deg;
        }

        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #0f172a;
            overflow: hidden;
            perspective: 1000px; /* Needed for 3D tilt */
        }

        /* Animated Background Gradients */
        .bg-glow {
            position: absolute;
            width: 600px; height: 600px;
            background: radial-gradient(circle, #3b82f6, transparent 70%);
            filter: blur(100px);
            opacity: 0.5;
            animation: move 10s infinite alternate;
        }

        @keyframes move { from { transform: translate(-20%, -20%); } to { transform: translate(20%, 20%); } }

        .glass-panel {
            width: 380px;
            padding: 32px;
            border-radius: 30px;
            color: white;
            position: relative;
            transform-style: preserve-3d;
            transform: rotateX(var(--tilt-x)) rotateY(var(--tilt-y));
            transition: transform 0.1s ease-out;

            /* Core Glass Effect */
            background: rgba(255, 255, 255, var(--bg-opacity));
            backdrop-filter: blur(var(--blur-val)) saturate(var(--saturate-val));
            -webkit-backdrop-filter: blur(var(--blur-val)) saturate(var(--saturate-val));
            border: 1px solid rgba(255, 255, 255, var(--border-val));
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);

            /* Glint Effect */
            background-image: linear-gradient(135deg, rgba(255,255,255,0.1) 0%, transparent 50%);
        }

        .controls { margin-top: 25px; display: flex; flex-direction: column; gap: 15px; }
        label { font-size: 10px; text-transform: uppercase; opacity: 0.6; }
        input { width: 100%; cursor: grab; }
    </style>
</head>
<body>

    <div class="bg-glow"></div>

    <div class="glass-panel" id="glass">
        <h2>Liquid Glass Pro</h2>
        <p>Tilt your mouse over me! Use the sliders to adjust the depth, tint, and blur in real-time.</p>
        
        <div class="controls">
            <label>Transparency</label>
            <input type="range" id="opacity" min="5" max="40" value="20">
            <label>Blur Intensity</label>
            <input type="range" id="blur" min="0" max="60" value="20">
        </div>
    </div>

    <script>
        const glass = document.getElementById('glass');
        
        // 1. Parallax Tilt Effect
        document.addEventListener('mousemove', (e) => {
            const { innerWidth, innerHeight } = window;
            const x = (e.clientX - innerWidth / 2) / 20;
            const y = (e.clientY - innerHeight / 2) / 20;
            glass.style.setProperty('--tilt-x', `${-y}deg`);
            glass.style.setProperty('--tilt-y', `${x}deg`);
        });

        // 2. Real-time controls with visual update
        document.getElementById('opacity').addEventListener('input', (e) => {
            glass.style.setProperty('--bg-opacity', e.target.value / 100);
        });

        document.getElementById('blur').addEventListener('input', (e) => {
            glass.style.setProperty('--blur-val', e.target.value + 'px');
            // 3. Simulated Haptic Feedback (console log serves as signal)
            if (window.navigator.vibrate) window.navigator.vibrate(5); 
        });
    </script>
</body>
</html>
