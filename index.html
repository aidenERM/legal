<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Liquid Glass Pro</title>
    <style>
        :root {
            /* Default Liquid Glass State */
            --bg-opacity: 0.15;
            --blur-val: 20px;
            --saturate-val: 180%;
            --border-val: 0.25;
        }

        body {
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: radial-gradient(circle at top right, #ff9a9e, #fad0c4),
                        radial-gradient(circle at bottom left, #a18cd1, #fbc2eb);
        }

        .glass-panel {
            width: 380px;
            padding: 32px;
            border-radius: 30px;
            color: white;
            
            /* Core Liquid Glass Mechanics */
            background: rgba(255, 255, 255, var(--bg-opacity));
            backdrop-filter: blur(var(--blur-val)) saturate(var(--saturate-val));
            -webkit-backdrop-filter: blur(var(--blur-val)) saturate(var(--saturate-val));
            
            /* Inner Border Effect */
            border: 1px solid rgba(255, 255, 255, var(--border-val));
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.15);
        }

        .controls {
            margin-top: 30px;
            padding: 20px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 20px;
            color: white;
        }

        .slider-row { margin-bottom: 15px; }
        label { display: block; font-size: 10px; text-transform: uppercase; margin-bottom: 5px; opacity: 0.7; }
        input { width: 100%; cursor: pointer; }
    </style>
</head>
<body>

    <div class="glass-panel" id="glass">
        <h1>Liquid Glass</h1>
        <p>This is a high-fidelity implementation featuring real-time saturation, blur, and opacity adjustments.</p>
        
        <div class="controls">
            <div class="slider-row">
                <label>Opacity</label>
                <input type="range" id="opacity" min="0" max="50" value="15">
            </div>
            <div class="slider-row">
                <label>Blur</label>
                <input type="range" id="blur" min="0" max="60" value="20">
            </div>
            <div class="slider-row">
                <label>Saturation</label>
                <input type="range" id="saturate" min="100" max="300" value="180">
            </div>
        </div>
    </div>

    <script>
        const glass = document.getElementById('glass');
        const sliders = document.querySelectorAll('input');

        sliders.forEach(slider => {
            slider.addEventListener('input', (e) => {
                if(e.target.id === 'opacity') glass.style.setProperty('--bg-opacity', e.target.value / 100);
                if(e.target.id === 'blur') glass.style.setProperty('--blur-val', e.target.value + 'px');
                if(e.target.id === 'saturate') glass.style.setProperty('--saturate-val', e.target.value + '%');
            });
        });
    </script>
</body>
</html>
