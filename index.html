
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Liquid Glass Ultimate</title>
    <style>
        body {
            margin: 0;
            background: #050505;
            color: white;
            font-family: system-ui, sans-serif;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        canvas {
            position: absolute;
            top: 0;
            left: 0;
            z-index: 0;
        }

        .main-card {
            z-index: 1;
            width: 320px;
            padding: 40px;
            border-radius: 40px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px) saturate(200%);
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            transition: transform 0.1s ease-out;
            transform-style: preserve-3d;
            text-align: center;
        }

        .controls {
            position: absolute;
            bottom: 30px;
            width: 300px;
            padding: 20px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            z-index: 2;
        }

        input {
            width: 100%;
            margin: 10px 0;
            accent-color: white;
        }
    </style>
</head>
<body>

    <canvas id="fluidCanvas"></canvas>

    <div class="main-card" id="card">
        <h1>Liquid Glass</h1>
        <p>This is the ultimate glass interface.</p>
    </div>

    <div class="controls">
        <label>Blur Intensity</label>
        <input type="range" id="blurSlider" min="0" max="50" value="20">
        <label>Opacity</label>
        <input type="range" id="opacitySlider" min="5" max="40" value="10">
    </div>

    <script>
        const card = document.getElementById('card');
        const blurSlider = document.getElementById('blurSlider');
        const opacitySlider = document.getElementById('opacitySlider');
        const canvas = document.getElementById('fluidCanvas');
        const ctx = canvas.getContext('2d');

        // Resize Canvas
        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.onresize = resize;
        resize();

        // Fluid Background Animation
        let time = 0;
        function draw() {
            ctx.fillStyle = '#050505';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = `hsl(${(time * 50) % 360}, 70%, 50%)`;
            ctx.beginPath();
            ctx.arc(canvas.width/2 + Math.sin(time)*100, canvas.height/2 + Math.cos(time)*100, 200, 0, Math.PI*2);
            ctx.fill();
            time += 0.01;
            requestAnimationFrame(draw);
        }
        draw();

        // 3D Tilt
        document.addEventListener('mousemove', (e) => {
            const x = (e.clientX - window.innerWidth / 2) / 20;
            const y = (e.clientY - window.innerHeight / 2) / 20;
            card.style.transform = `rotateY(${x}deg) rotateX(${-y}deg)`;
        });

        // Sliders
        blurSlider.oninput = (e) => {
            card.style.backdropFilter = `blur(${e.target.value}px) saturate(200%)`;
        };

        opacitySlider.oninput = (e) => {
            card.style.background = `rgba(255, 255, 255, ${e.target.value / 100})`;
        };
    </script>
</body>
</html>
